<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <title>RaceTrack</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <main id="app">
    <!-- Screen routing: showScreen() in src/app.ts toggles .active class -->
    <section id="screen-home" class="screen active" aria-label="Home">
      <h1>🏎️ RaceTrack</h1>
      <div id="home-profile"></div>
      <button id="btn-create" class="btn btn-primary">Créer une course</button>
      <button id="btn-join" class="btn btn-secondary">Rejoindre</button>
      <div class="home-nav">
        <button id="btn-quests" class="btn btn-small">Défis</button>
        <button id="btn-circuits" class="btn btn-small">Mes circuits</button>
        <button id="btn-shop" class="btn btn-small">Shop</button>
        <button id="btn-profile" class="btn btn-small">Profil</button>
      </div>
    </section>

    <section id="screen-quests" class="screen" aria-label="Défis du jour" style="justify-content:flex-start;overflow-y:auto;padding-bottom:24px;">
      <h2 style="margin-top:20px;">Défis du jour</h2>
      <p class="quests-subtitle">3 nouveaux défis chaque jour — réclame tes pièces&nbsp;!</p>
      <div id="quests-container" style="width:100%;max-width:400px;"></div>
      <button id="btn-quests-back" class="btn btn-secondary">Retour</button>
    <section id="screen-circuits" class="screen" aria-label="Mes circuits">
      <h2>Mes circuits</h2>
      <button id="btn-new-circuit" class="btn btn-primary">+ Nouveau circuit</button>
      <div id="circuits-list" class="circuits-list"></div>
      <button id="btn-circuits-back" class="btn btn-secondary">Retour</button>
    </section>

    <section id="screen-editor" class="screen" aria-label="Éditeur">
      <input id="editor-name" class="editor-name" type="text" maxlength="24" placeholder="Nom du circuit">
      <canvas id="editor-canvas"></canvas>
      <div id="editor-tools" role="toolbar" aria-label="Outils de dessin">
        <button class="tool-btn active" data-tool="track">🛣️ Piste</button>
        <button class="tool-btn" data-tool="start">🏁 Départ</button>
        <button class="tool-btn" data-tool="finish">🎯 Arrivée</button>
        <button class="tool-btn" data-tool="wall">🧽 Gomme</button>
      </div>
      <div id="editor-msg" class="editor-msg" role="status"></div>
      <div id="editor-actions">
        <button id="btn-editor-test" class="btn btn-small">▶︎ Tester</button>
        <button id="btn-editor-save" class="btn btn-small">💾 Sauver</button>
        <button id="btn-editor-clear" class="btn btn-small">Effacer</button>
        <button id="btn-editor-back" class="btn btn-small">Retour</button>
      </div>
    </section>

    <section id="screen-solo" class="screen" aria-label="Course solo">
      <div id="solo-hud"><span id="solo-status"></span></div>
      <canvas id="solo-canvas"></canvas>
      <div id="solo-actions">
        <button id="btn-solo-restart" class="btn btn-small">↺ Recommencer</button>
        <button id="btn-solo-back" class="btn btn-small">Retour</button>
      </div>
    </section>

    <section id="screen-lobby" class="screen" aria-label="Lobby">
      <h2>Lobby</h2>
      <div id="lobby-code" class="code-display"></div>
      <div id="lobby-players"></div>
      <button id="btn-start" class="btn btn-primary" style="display:none">Lancer la course!</button>
      <button id="btn-leave" class="btn btn-secondary">Quitter</button>
    </section>

    <section id="screen-game" class="screen" aria-label="Game">
      <div id="game-hud">
        <span id="hud-turn"></span>
        <span id="hud-player"></span>
      </div>
      <canvas id="game-canvas"></canvas>
      <div id="game-status"></div>
    </section>

    <section id="screen-result" class="screen" aria-label="Results">
      <h2>Résultats</h2>
      <div id="result-ranking"></div>
      <div id="result-rewards"></div>
      <button id="btn-home" class="btn btn-primary">Retour</button>
    </section>

    <section id="screen-shop" class="screen" aria-label="Shop" style="justify-content:flex-start;overflow-y:auto;padding-bottom:24px;">
      <h2 style="margin-top:20px;">Shop</h2>
      <div id="shop-container" style="width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;"></div>
      <button id="btn-shop-back" class="btn btn-secondary">Retour</button>
    </section>

    <section id="screen-profile" class="screen" aria-label="Profile">
      <h2>Profil</h2>
      <div id="profile-stats"></div>
      <div id="profile-history"></div>
      <button id="btn-profile-back" class="btn btn-secondary">Retour</button>
    </section>
  </main>

  <script src="dist/bundle.js"></script>
  <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }</script>
</body>
</html>
