name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - name: Prepare deploy
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r css _site/
          cp -r dist _site/
          cp -r icons _site/ 2>/dev/null || true
          cp manifest.json _site/
          cp sw.js _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
